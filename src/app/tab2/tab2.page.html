<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Partite</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="matches-container">
  <ion-list mode="ios" style="background: transparent">
    @for (m of partite(); track m.id) {
    <ion-item-sliding #slidingItem>
      <ion-item
        (click)="apriModalePartita(m)"
        lines="none"
        class="match-card-item"
      >
        <div class="match-card">
          <div class="match-header">
            <div class="match-date">
              <ion-icon name="calendar-outline"></ion-icon>
              {{ m.dataPartita | date:'dd/MM/yyyy' }}
            </div>

            <div
              class="status-badge"
              [ngClass]="m.pagelleInserite ? 'badge-success' : 'badge-warning'"
            >
              <ion-icon
                [name]="m.pagelleInserite ? 'checkmark-done-circle' : 'star-half'"
              ></ion-icon>
              {{ m.pagelleInserite ? 'ARCHIVIATA' : 'DA VOTARE' }}
            </div>
          </div>

          <div class="match-body">
            <div class="scoreboard">
              <div class="score-box">{{ m.scoreA }}</div>
              <div class="score-divider">-</div>
              <div class="score-box">{{ m.scoreB }}</div>
            </div>
          </div>

          <div class="match-footer">
            <div class="info-pill">
              <ion-icon name="location-outline"></ion-icon>
              {{ m.luogo }}
            </div>
            <div class="info-pill">
              <ion-icon name="people-outline"></ion-icon>
              {{ m.convocati?.length || 0 }} Giocatori
            </div>
          </div>
        </div>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option
          color="danger"
          (click)="confermaEliminazione(m, slidingItem)"
        >
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
    }
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="apriModalePartita()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
